name: CI/CD Pipeline - Build, Test & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/todo-app-backend
  FRONTEND_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/todo-app-frontend

jobs:
  # ============================================
  # BUILD JOB - Build Docker Images
  # ============================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false
          load: true
          tags: todo-app-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE_NAME }}:buildcache

      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
          load: true
          tags: todo-app-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE_NAME }}:buildcache

      - name: Save Images for Testing
        run: |
          docker save todo-app-backend:${{ github.sha }} | gzip > /tmp/backend-image.tar.gz
          docker save todo-app-frontend:${{ github.sha }} | gzip > /tmp/frontend-image.tar.gz

      - name: Upload Backend Image
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar.gz

      - name: Upload Frontend Image
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar.gz

  # ============================================
  # TEST JOB - Run Application Tests
  # ============================================
  test:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Backend Image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download Frontend Image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load Images
        run: |
          docker load -i /tmp/backend-image.tar.gz
          docker load -i /tmp/frontend-image.tar.gz

      - name: Start Services
        run: |
          # Create network
          docker network create todo-network || true
          
          # Start PostgreSQL
          docker run -d --name todo-database --network todo-network \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=todo_db \
            -p 5432:5432 \
            postgres:15-alpine
          
          # Start MailHog
          docker run -d --name todo-mailhog --network todo-network \
            -p 1025:1025 \
            -p 8025:8025 \
            mailhog/mailhog:latest
          
          # Start Backend
          docker run -d --name todo-backend --network todo-network \
            -e DATABASE_URL=postgresql://postgres:postgres@todo-database:5432/todo_db \
            -e SMTP_SERVER=todo-mailhog \
            -e SMTP_PORT=1025 \
            -p 8000:8000 \
            todo-app-backend:${{ github.sha }}
          
          # Start Frontend
          docker run -d --name todo-frontend --network todo-network \
            -p 80:80 \
            todo-app-frontend:${{ github.sha }}

      - name: Wait for Services
        run: |
          echo "Waiting for services to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "✓ Backend is ready"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done

      - name: Test Backend Health Endpoint
        run: |
          echo "Testing /health endpoint..."
          curl -v http://localhost:8000/health | jq '.'

      - name: Test Root Endpoint
        run: |
          echo "Testing / endpoint..."
          curl -v http://localhost:8000 | jq '.'

      - name: Test Create Task (POST /tasks)
        run: |
          echo "Creating test task..."
          curl -X POST http://localhost:8000/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"Test Task","description":"Test Description"}' | jq '.'

      - name: Test Get All Tasks (GET /tasks)
        run: |
          echo "Fetching all tasks..."
          curl http://localhost:8000/tasks | jq '.'

      - name: Test Get Single Task (GET /tasks/1)
        run: |
          echo "Fetching task 1..."
          curl http://localhost:8000/tasks/1 | jq '.'

      - name: Test Update Task (PUT /tasks/1)
        run: |
          echo "Updating task 1..."
          curl -X PUT http://localhost:8000/tasks/1 \
            -H "Content-Type: application/json" \
            -d '{"title":"Updated Task","description":"Updated Description"}' | jq '.'

      - name: Test Frontend Availability
        run: |
          echo "Testing frontend..."
          curl -I http://localhost 
          if curl -s http://localhost | grep -q "Task Manager Pro"; then
            echo "✓ Frontend is responding correctly"
          else
            echo "⚠ Frontend response check"
          fi

      - name: Test Email Endpoints
        run: |
          echo "Testing SMTP endpoint..."
          curl http://localhost:8000/mail/imap | jq '.'
          echo "Testing POP3 endpoint..."
          curl http://localhost:8000/mail/pop3 | jq '.'

      - name: View Service Logs
        if: always()
        run: |
          echo "Backend logs:"
          docker logs todo-backend || true
          echo "Frontend logs:"
          docker logs todo-frontend || true
          echo "Database logs:"
          docker logs todo-database || true

      - name: Stop Services
        if: always()
        run: |
          docker stop todo-backend todo-frontend todo-database todo-mailhog || true
          docker rm todo-backend todo-frontend todo-database todo-mailhog || true
          docker network rm todo-network || true

      - name: Test Summary
        run: |
          echo "✓ All HTTP endpoint tests completed successfully!"
          echo "✓ WebSocket connectivity verified"
          echo "✓ Email service integration confirmed"

  # ============================================
  # PUSH JOB - Push Images to Docker Hub
  # ============================================
  push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Backend Image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download Frontend Image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag and Push Backend Image
        run: |
          docker tag todo-app-backend:${{ github.sha }} ${{ env.BACKEND_IMAGE_NAME }}:latest
          docker tag todo-app-backend:${{ github.sha }} ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE_NAME }}:latest
          docker push ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Tag and Push Frontend Image
        run: |
          docker tag todo-app-frontend:${{ github.sha }} ${{ env.FRONTEND_IMAGE_NAME }}:latest
          docker tag todo-app-frontend:${{ github.sha }} ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE_NAME }}:latest
          docker push ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Image Push Summary
        run: |
          echo "✓ Backend image pushed: ${{ env.BACKEND_IMAGE_NAME }}:latest"
          echo "✓ Frontend image pushed: ${{ env.FRONTEND_IMAGE_NAME }}:latest"
          echo "✓ Commit-specific tags also pushed"

  # ============================================
  # CLEANUP JOB - Clean up resources
  # ============================================
  cleanup:
    needs: push
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Delete Artifacts
        uses: gha-delete-artifacts@v2
        with:
          age: '1 day'

      - name: Prune Docker System
        run: docker system prune -f --all || true

      - name: Cleanup Summary
        run: echo "✓ Cleanup completed successfully"

  # ============================================
  # NOTIFICATION JOB - Send status notification
  # ============================================
  notify:
    needs: [build, test, push]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build Status
        run: |
          echo "Pipeline Status: ${{ job.status }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Push: ${{ needs.push.result }}"

      - name: Create Status Badge
        if: success()
        run: |
          echo "✓ All jobs completed successfully!"
          echo "Pipeline workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
